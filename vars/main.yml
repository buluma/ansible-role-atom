---
# vars file for atom

_atom_requirements:
  apt:
    - wget
  dnf5: []

atom_requirements: "{{ _atom_requirements[ansible_facts['pkg_mgr']] | default(omit) }}"

_atom_package:
  apt:
    url: "https://github.com/atom/atom/releases/download/v1.60.0/atom-amd64.deb"
    name: atom-amd64.deb
  dnf: &rpmpackage
    url: "https://github.com/atom/atom/releases/download/v1.60.0/atom.x86_64.rpm"
    name: atom.x86_64.rpm
  dnf5: *rpmpackage
  yum: *rpmpackage
  zypper: *rpmpackage
atom_package_url: "{{ _atom_package[ansible_facts['pkg_mgr']]['url'] }}"
atom_package: "{{ _atom_package[ansible_facts['pkg_mgr']]['name'] }}"
